fake_sensor_adapter:
  ros__parameters:
    topic: /edge/sensors/fake_primary
    sensor_id: fake_primary
    frame_id: fake_sensor_frame
    publish_hz: 100.0
    status_mode: "warn"
    fault_mode: "drop"
    drop_enabled: true
    drop_probability: 0.2
    drop_seed: 42
    qos_depth: 10
    qos_reliability: best_effort
