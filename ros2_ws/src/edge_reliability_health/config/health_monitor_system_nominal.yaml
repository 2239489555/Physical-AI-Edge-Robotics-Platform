    max_p95_latency_ms_unhealthy: 100.0
    max_p99_latency_ms_warning: 100.0
    max_p99_latency_ms_unhealthy: 200.0
    max_cpu_percent_warning: 85.0
    max_cpu_percent_unhealthy: 95.0
    max_memory_used_percent_warning: 80.0
    max_memory_used_percent_unhealthy: 95.0
    max_disk_used_percent_warning: 80.0
    max_disk_used_percent_unhealthy: 95.0
    max_gpu_percent_warning: 90.0
    max_gpu_percent_unhealthy: 98.0
    max_temperature_c_warning: 75.0
    max_temperature_c_unhealthy: 85.0
    max_power_w_warning: 45.0
    max_power_w_unhealthy: 60.0
    min_expected_count: 10
